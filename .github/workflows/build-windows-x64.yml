name: build-windows-x64  
  
on:  
  push:  
    branches: [main]  
  workflow_dispatch:  
  
env:  
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"  
  
jobs:  
  build:  
    name: Build - x86_64-pc-windows-msvc  
    runs-on: windows-latest  
    timeout-minutes: 90  
    permissions:  
      contents: read  
    defaults:  
      run:  
        working-directory: codex-rs  
  
    steps:  
      - uses: actions/checkout@v4  
  
      - uses: dtolnay/rust-toolchain@stable  
        with:  
          targets: x86_64-pc-windows-msvc  
  
      - name: Configure MSVC env  
        uses: ./.github/actions/setup-msvc-env  
        with:  
          target: x86_64-pc-windows-msvc  
  
      - name: Configure rusty_v8 prebuilt artifacts  
        uses: ./.github/actions/setup-rusty-v8  
        with:  
          target: x86_64-pc-windows-msvc  
  
      - name: Apply patches  
        shell: bash  
        working-directory: ${{ github.workspace }}  
        run: |  
          for patch in my-patches/*.patch; do  
            [[ -f "$patch" ]] || continue  
            echo "Applying $patch ..."  
            git apply "$patch"  
          done  
  
      - name: Cargo build  
        shell: bash  
        run: |  
          export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC  
          cargo build --target x86_64-pc-windows-msvc --release \  
            --bin codex \  
            --bin codex-responses-api-proxy \  
            --bin codex-windows-sandbox-setup \  
            --bin codex-command-runner \  
            --bin codex-app-server  
  
      - name: Upload artifacts  
        uses: actions/upload-artifact@v4  
        with:  
          name: x86_64-pc-windows-msvc  
          path: codex-rs/target/x86_64-pc-windows-msvc/release/*.exe  
          if-no-files-found: error  
  
  release:  
    needs: build  
    runs-on: ubuntu-latest  
    permissions:  
      contents: write  
    steps:  
      - uses: actions/checkout@v4  
  
      - name: Get version from Cargo.toml  
        run: |  
          VERSION=$(grep -m1 '^version' codex-rs/Cargo.toml \  
            | sed -E 's/version *= *"([^"]+)".*/\1/')  
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"  
  
      - name: Download artifacts  
        uses: actions/download-artifact@v4  
        with:  
          path: artifacts/  
  
      - name: Configure git  
        run: |  
          git config user.name "github-actions[bot]"  
          git config user.email "github-actions[bot]@users.noreply.github.com"  
  
      - name: Create or update release  
        env:  
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
        run: |  
          TAG="v${{ env.VERSION }}"  
  
          gh release delete "${TAG}" --yes 2>/dev/null || true  
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true  
  
          git tag "${TAG}"  
          git push origin "${TAG}"  
  
          mapfile -t files < <(find artifacts/ -type f)  
  
          gh release create "${TAG}" \  
            --title "${TAG}" \  
            --notes "Auto-built from upstream v${{ env.VERSION }} with custom patches." \  
            "${files[@]}"