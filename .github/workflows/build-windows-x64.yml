name: build-windows-x64  
  
on:  
  push:  
    branches: [main]  
  workflow_dispatch:  
  
env:  
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"  
  
jobs:  
  build:  
    name: Build x86_64-pc-windows-msvc  
    runs-on: windows-latest  
    timeout-minutes: 90  
    permissions:  
      contents: write  
    defaults:  
      run:  
        working-directory: codex-rs  
  
    steps:  
      - uses: actions/checkout@v4  
  
      - uses: dtolnay/rust-toolchain@stable  
        with:  
          targets: x86_64-pc-windows-msvc  
  
      - name: Configure MSVC env  
        uses: ./.github/actions/setup-msvc-env  
        with:  
          target: x86_64-pc-windows-msvc  
  
      - name: Cargo build  
        shell: bash  
        run: |  
          export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC  
          cargo build --target x86_64-pc-windows-msvc --release \  
            --bin codex \  
            --bin codex-responses-api-proxy \  
            --bin codex-windows-sandbox-setup \  
            --bin codex-command-runner \  
            --bin codex-app-server  
  
      - name: Upload artifacts  
        uses: actions/upload-artifact@v4  
        with:  
          name: codex-x86_64-pc-windows-msvc  
          path: codex-rs/target/x86_64-pc-windows-msvc/release/*.exe  
          if-no-files-found: error  
